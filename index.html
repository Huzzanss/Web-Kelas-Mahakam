<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelas Mahakam</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="logo">Mahakam</div>
</nav>

<section class="hero">
  <h1>MAHAKAM</h1>
  <p>bukan sekadar kelas.</p>

  <div class="spotlight">
    Hari ini: <span id="todayStudent">-</span>
  </div>
</section>

<!-- COUNTDOWN -->
<section class="container center">
  <h2>Menuju Kelulusan</h2>
  <div class="count-grid">
    <div><span id="days">0</span><p>Hari</p></div>
    <div><span id="hours">0</span><p>Jam</p></div>
    <div><span id="minutes">0</span><p>Menit</p></div>
    <div><span id="seconds">0</span><p>Detik</p></div>
  </div>
</section>

<!-- LIVE MOOD -->
<section class="container center">
<h2>Mood Kelas Hari Ini</h2>
<div class="mood-grid">
<button data-mood="🔥">🔥</button>
<button data-mood="😂">😂</button>
<button data-mood="😴">😴</button>
<button data-mood="😎">😎</button>
</div>
<p id="topMood"></p>
</section>

<!-- GENERATOR -->
<section class="container center">
<h2>Kalau Mahakam Adalah…</h2>
<button onclick="generateMahakam()">Generate</button>
<p id="mahakamResult"></p>
</section>

<!-- FINAL MESSAGE -->
<div id="finalMessage" class="final-message">
💙 Tinggal hitungan hari.<br>
Mahakam akan selalu hidup di ingatan.
</div>

<!-- CHAT -->
<div class="chat-toggle" id="chatToggle">💬</div>
<div class="chat-box" id="chatBox">
  <div class="chat-header">Chat Anonim</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="typing" id="typing"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="Ketik pesan...">
    <button id="sendBtn">Kirim</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="features.js"></script>
<script src="chat.js"></script>

</body>
</html>
