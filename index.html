<!-- FLOATING CHAT -->

<div class="chat-toggle" id="chatToggle">💬</div>

<div class="chat-box" id="chatBox">

<div class="chat-header">
Chat Anonim
<span id="closeChat">✕</span>
</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input-area">
<input type="text" id="chatInput" placeholder="Kirim pesan..." maxlength="120">
<button onclick="sendMessage()">Kirim</button>
</div>

</div>



<script>

/* NAVBAR SCROLL */

window.addEventListener('scroll',()=>{

const nav = document.getElementById('navbar');

if(window.scrollY > 50){
nav.classList.add('scrolled');
}else{
nav.classList.remove('scrolled');
}

});


/* SCROLL ANIMATION */

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
},{threshold:.15});

setTimeout(()=>{
document.querySelectorAll('.murid-card')
.forEach(card=>observer.observe(card));
},300);



/* 3D HOVER */

document.addEventListener('mousemove', e=>{

document.querySelectorAll('.murid-card').forEach(card=>{

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

const centerX = rect.width/2;
const centerY = rect.height/2;

const rotateX = (y-centerY)/18;
const rotateY = (centerX-x)/18;

if(card.matches(':hover')){
card.style.transform =
`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.04)`;
}

});

});

document.addEventListener('mouseleave',()=>{
document.querySelectorAll('.murid-card')
.forEach(card=>{
card.style.transform='rotateX(0) rotateY(0) scale(1)';
});
});



/* CHAT */

const toggle = document.getElementById('chatToggle');
const chatBox = document.getElementById('chatBox');

toggle.onclick=()=>chatBox.classList.toggle('show');

document.getElementById('closeChat')
.onclick=()=>chatBox.classList.remove('show');

function sendMessage(){

const input = document.getElementById('chatInput');
const messages = document.getElementById('chatMessages');

if(input.value.trim()==='') return;

const msg = document.createElement('div');
msg.className='message';
msg.innerText=input.value;

messages.appendChild(msg);

messages.scrollTop=messages.scrollHeight;

input.value='';

saveMessages();
}

document.getElementById('chatInput')
.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});


function saveMessages(){

const msgs=[];

document.querySelectorAll('.message')
.forEach(m=>msgs.push(m.innerText));

localStorage.setItem('anonChat',JSON.stringify(msgs));
}

function loadMessages(){

const data=JSON.parse(localStorage.getItem('anonChat'));
if(!data) return;

const messages=document.getElementById('chatMessages');

data.forEach(text=>{
const msg=document.createElement('div');
msg.className='message';
msg.innerText=text;
messages.appendChild(msg);
});

}

loadMessages();

</script>

</body>
</html>
